name: Aplicar fix Mundial J70

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/resincronizar_mundial.yml
      - .github/workflows/apply-mundial-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml
      - name: Corregir Mundial y resincronizar
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          resultados_path = Path('data/mundial_2026_resultados.json')
          data = json.loads(resultados_path.read_text(encoding='utf-8'))
          cambiado = False
          for item in data.get('resultados', []):
              if (
                  item.get('local') == 'Noruega'
                  and item.get('visitante') == 'Francia'
                  and item.get('resultado') == '1-1'
                  and item.get('confianza') == 'confirmado'
              ):
                  item['resultado'] = '1-4'
                  cambiado = True
          if not cambiado:
              print('No se encontro Noruega-Francia 1-1 confirmado; no se cambio resultado manual.')
          resultados_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          script_path = Path('actualizar_mundial_2026.py')
          script = script_path.read_text(encoding='utf-8')
          if 'https://www.resultados-futbol.com/mundial2026' not in script:
              script = script.replace(
                  '    "https://www.quiniela15.com/resultados-quiniela",\n    "https://dondeverlo.es/quiniela/directo/",',
                  '    "https://www.quiniela15.com/resultados-quiniela",\n    "https://www.resultados-futbol.com/mundial2026",\n    "https://dondeverlo.es/quiniela/directo/",'
              )
          if '    "iran": "iran",' not in script:
              script = script.replace(
                  '    "belgica": "belgica",\n    "tunez": "tunez",',
                  '    "belgica": "belgica",\n    "belgium": "belgica",\n    "egipto": "egipto",\n    "egypt": "egipto",\n    "iran": "iran",\n    "irán": "iran",\n    "n zelanda": "nueva zelanda",\n    "n. zelanda": "nueva zelanda",\n    "nueva zelanda": "nueva zelanda",\n    "new zealand": "nueva zelanda",\n    "tunez": "tunez",'
              )
          if '    if base == "nueva zelanda":' not in script:
              script = script.replace(
                  '    if base == "curazao":\n        variantes.update({"curacao", "curaçao"})\n',
                  '    if base == "curazao":\n        variantes.update({"curacao", "curaçao"})\n    if base == "nueva zelanda":\n        variantes.update({"n zelanda", "n. zelanda", "new zealand"})\n    if base == "iran":\n        variantes.update({"irán", "iran"})\n    if base == "egipto":\n        variantes.update({"egypt", "egipto"})\n'
              )
          if 'def es_partido_especial_mundial_2026' not in script:
              old = '''def buscar_resultado_en_texto(texto, local, visitante):\n    patrones = [\n        r"(?P<a>\\d{1,2})\\s*[-]\\s*(?P<b>\\d{1,2})",\n        r"(?P<a>\\d{1,2})\\s+a\\s+(?P<b>\\d{1,2})",\n    ]\n    for patron in patrones:\n        for match in re.finditer(patron, texto, re.I):\n            frag = texto[max(0, match.start() - 220): min(len(texto), match.end() + 220)]\n            if not (contiene_equipo(frag, local) and contiene_equipo(frag, visitante)):\n                continue\n            if re.search(r"\\b(descanso|1t|2t|min\\.?|minuto|en juego|pend|pr[oó]ximo|previa)\\b", frag, re.I):\n                continue\n            return f"{int(match.group('a'))}-{int(match.group('b'))}"\n    return ""\n'''
              new = '''def es_partido_especial_mundial_2026(local, visitante):\n    equipos = {normalizar(local), normalizar(visitante)}\n    return equipos in (\n        {"egipto", "iran"},\n        {"nueva zelanda", "belgica"},\n    )\n\n\ndef buscar_resultado_en_texto(texto, local, visitante):\n    patrones = [\n        r"(?P<a>\\d{1,2})\\s*[-]\\s*(?P<b>\\d{1,2})",\n        r"(?P<a>\\d{1,2})\\s+a\\s+(?P<b>\\d{1,2})",\n    ]\n    ventanas = [220]\n    if es_partido_especial_mundial_2026(local, visitante):\n        # Patrones adicionales: Egipto cerca de Iran, y Nueva Zelanda/N. Zelanda cerca de Belgica.\n        # Algunas fuentes separan nombres y marcador con mucho HTML intermedio.\n        ventanas.extend([450, 700])\n    for ventana in ventanas:\n        for patron in patrones:\n            for match in re.finditer(patron, texto, re.I):\n                frag = texto[max(0, match.start() - ventana): min(len(texto), match.end() + ventana)]\n                if not (contiene_equipo(frag, local) and contiene_equipo(frag, visitante)):\n                    continue\n                if re.search(r"\\b(descanso|1t|2t|min\\.?|minuto|en juego|pend|pr[oó]ximo|previa)\\b", frag, re.I):\n                    continue\n                return f"{int(match.group('a'))}-{int(match.group('b'))}"\n    return ""\n'''
              if old not in script:
                  raise SystemExit('No se encontro bloque buscar_resultado_en_texto esperado')
              script = script.replace(old, new)
          script_path.write_text(script, encoding='utf-8')
          PY
          python sincronizar_mundial_jornadas.py
          rm -f .github/workflows/apply-mundial-fix.yml
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add actualizar_mundial_2026.py data/mundial_2026_resultados.json data/jornadas/jornada_70.json .github/workflows/apply-mundial-fix.yml
          git diff --staged --quiet || git commit -m "Resincronizar resultados Mundial J70"
          git push
