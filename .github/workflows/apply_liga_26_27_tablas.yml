name: Apply Liga 26 27 Tables Patch

on:
  push:
    branches: [tmp-liga-26-27-tablas-v2]
    paths:
      - 'scripts/apply_liga_26_27_tablas.py'
      - '.github/workflows/apply_liga_26_27_tablas.yml'

permissions:
  contents: write

jobs:
  patch-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply surgical patch
        run: python scripts/apply_liga_26_27_tablas.py
      - name: Verify diff before commit
        run: |
          git diff -- index.html
          changed="$(git diff --name-only)"
          test "$changed" = "index.html"
          grep -q "LALIGA EA SPORTS 2026/27" index.html
          grep -q "LALIGA HYPERMOTION 2026/27" index.html
          grep -q "Racing de Santander" index.html
          grep -q "Deportivo de La Coruña" index.html
          grep -q "Málaga CF" index.html
          grep -q "CD Tenerife" index.html
          grep -q "CD Sabadell" index.html
          grep -q "<th>Pos</th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th>" index.html
      - name: Commit exact change
        run: |
          rm -f scripts/apply_liga_26_27_tablas.py .github/workflows/apply_liga_26_27_tablas.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: liga 26/27 tablas clasificacion LALIGA EA SPORTS y HYPERMOTION a 0 puntos"
          git push
