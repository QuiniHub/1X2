name: Apply Index J70 Patch

on:
  push:
    branches: [tmp-index-j70-historial]
    paths:
      - 'scripts/apply_index_j70_patch.py'
      - '.github/workflows/apply_index_j70_patch.yml'

permissions:
  contents: write

jobs:
  patch-index:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply surgical patch
        run: python scripts/apply_index_j70_patch.py
      - name: Verify diff before commit
        run: |
          git diff -- index.html
          changed="$(git diff --name-only)"
          test "$changed" = "index.html"
          git diff --unified=0 -- index.html | tee /tmp/index.diff
          grep -q "Number(r.jornada) >= 70" index.html
          grep -q "Total premios cobrados" index.html
          ! grep -q "metric('Coste boleto'" index.html
          ! grep -q "metric('Apuestas'" index.html
      - name: Commit exact change
        run: |
          rm -f scripts/apply_index_j70_patch.py .github/workflows/apply_index_j70_patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: historial desde J70, sin gastos, metricas simplificadas"
          git push
