name: Aplicar fix J70 Flashscore disparo

on:
  push:
    branches:
      - main
    paths:
      - .github/trigger-j70-flashscore.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 lxml
      - name: Corregir resultados J70 y regenerar diario
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          now = datetime.now(timezone.utc).isoformat()
          def guardar(path, data):
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          mundial_path = Path('data/mundial_2026_resultados.json')
          mundial = json.loads(mundial_path.read_text(encoding='utf-8'))
          fixes = [
              {'fecha': '2026-06-27', 'grupo': 'G', 'local': 'Nueva Zelanda', 'visitante': 'Bélgica', 'resultado': '1-5', 'signo': '2'},
              {'fecha': '2026-06-27', 'grupo': 'H', 'local': 'Uruguay', 'visitante': 'España', 'resultado': '0-1', 'signo': '2'},
              {'fecha': '2026-06-27', 'grupo': 'H', 'local': 'Cabo Verde', 'visitante': 'Arabia Saudí', 'resultado': '0-0', 'signo': 'X'},
          ]
          resultados = mundial.setdefault('resultados', [])
          for fix in fixes:
              found = next((x for x in resultados if x.get('local') == fix['local'] and x.get('visitante') == fix['visitante']), None)
              if found is None:
                  found = {'fecha': fix['fecha'], 'grupo': fix['grupo'], 'local': fix['local'], 'visitante': fix['visitante']}
                  resultados.append(found)
              found.update({'resultado': fix['resultado'], 'signo': fix['signo'], 'confianza': 'confirmado', 'fuente': 'correccion_manual_j70', 'actualizado_en': now})
              found['fecha'] = found.get('fecha') or fix['fecha']
              found['grupo'] = found.get('grupo') or fix['grupo']
          mundial['actualizado_en'] = now
          guardar(mundial_path, mundial)
          jornada_path = Path('data/jornadas/jornada_70.json')
          jornada = json.loads(jornada_path.read_text(encoding='utf-8'))
          for partido in jornada.get('partidos', []):
              if int(partido.get('num') or 0) == 7:
                  partido.update({'resultado': '0-0', 'signo_oficial': 'X', 'fuente_resultado': 'correccion_manual_j70', 'actualizado_en': now})
              if int(partido.get('num') or 0) == 9:
                  partido.update({'resultado': '1-5', 'signo_oficial': '2', 'fuente_resultado': 'correccion_manual_j70', 'actualizado_en': now})
          pleno = jornada.get('pleno15') or {}
          pleno.update({'resultado': '0-1', 'signo_oficial': '2', 'fuente_resultado': 'correccion_manual_j70', 'actualizado_en': now})
          jornada['pleno15'] = pleno
          jornada['actualizado_en'] = now
          guardar(jornada_path, jornada)
          PY
          python sincronizar_mundial_jornadas.py
          python generar_diario_aprendizaje.py
          rm -f .github/workflows/apply-j70-flashscore-fix.yml .github/workflows/apply-j70-flashscore-fix-2.yml .github/trigger-j70-flashscore.txt
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/ .github/workflows/apply-j70-flashscore-fix.yml .github/workflows/apply-j70-flashscore-fix-2.yml .github/trigger-j70-flashscore.txt
          git diff --staged --quiet || git commit -m "Corregir resultados J70 y regenerar diario"
          git push
