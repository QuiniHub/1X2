name: Actualizar Quiniela IA Pro Completo

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar actualización
        run: python actualizar_todo.py
