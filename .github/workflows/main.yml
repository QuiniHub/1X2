name: Actualizar Quiniela IA Pro Completo

on:
  workflow_dispatch:
  push:
    branches:
      - main
  page_build:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "*/5 17-23 * * *"

concurrency:
  group: actualizar-quiniela
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 requests pandas lxml

      - name: Integrar cambios remotos
        run: |
          git pull --rebase origin main

      - name: Aplicar alineacion critica pronostico analisis
        run: |
          python alinear_pronostico_analisis.py
          python mejorar_prioridad_coberturas.py
          python verificar_coherencia_pronostico.py
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html motor_prediccion_quiniela.py data/memoria_ia/verificacion_pronostico_analisis.json data/memoria_ia/estado_vivo.json
          git diff --cached --quiet && echo "Alineacion ya aplicada" || git commit -m "Alinear pronostico y analisis en web"
          git push
          git pull --rebase origin main

      - name: Actualizar datos
        run: |
          python actualizar_todo.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Actualizacion automatica completa"
          git push