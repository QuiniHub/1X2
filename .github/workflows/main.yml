name: Actualizar Quiniela IA Pro Completo

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ejecutar actualizadores
        run: |
          python actualizar_resultados.py
          python actualizar_historico_boletos.py
          python actualizar_porcentajes_apostados.py
          python actualizar_eduardo_losilla.py
          python actualizar_cuotas.py
          python actualizar_plantillas.py
          python actualizar_xg.py
          python actualizar_arbitros.py
          python actualizar_clima.py
          python analizar_historico_quinielas.py
          python comparar_boletos.py
          python entrenar_modelo.py
          python generar_pronostico.py

      - name: Guardar cambios
        run: |
          git config user.name "quiniela-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "Actualizar datos quiniela" || echo "Sin cambios"
          git push
