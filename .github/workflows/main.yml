name: Actualizar Quiniela IA Pro Completo

on:
  workflow_dispatch:
  push:
    branches:
      - main
  page_build:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: actualizar-quiniela
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: |
          echo "::group::Pruebas unitarias"
          python -m unittest discover -s tests
          echo "::endgroup::"

      - name: Integrar cambios remotos
        run: |
          git pull --rebase origin main

      - name: Actualizar datos y validar publicacion
        run: |
          echo "::group::Actualizacion completa"
          python actualizar_todo.py
          echo "::endgroup::"

      - name: Validar JSON generado
        run: |
          echo "::group::Validacion JSON"
          python validar_json_data.py
          echo "::endgroup::"

      - name: Comprobar ciclo de aprendizaje
        run: |
          echo "::group::Ciclo aprendizaje"
          python verificar_ciclo_aprendizaje.py
          echo "::endgroup::"

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet && echo "Sin cambios" || git commit -m "Actualizacion automatica completa"
          git push || (sleep 10 && git pull --rebase origin main && git push)
