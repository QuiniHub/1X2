name: Apply Motivacion Patch

on:
  push:
    branches: [main]
    paths:
      - 'scripts/apply_motivacion_patch.py'
      - '.github/workflows/apply_motivacion_patch.yml'

permissions:
  contents: write

jobs:
  patch-motor:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: python scripts/apply_motivacion_patch.py
      - name: Commit motor patch
        run: |
          rm -f scripts/apply_motivacion_patch.py .github/workflows/apply_motivacion_patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: ajuste motivacion competitiva en motor para Mundial y ligas"
            git push
          fi
