name: Aplicar integracion buscador Google

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/buscar_resultados.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Integrar buscar_resultados_google
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('actualizar_todo.py')
          text = path.read_text(encoding='utf-8')

          if '    "buscar_resultados_google.py",\n    "actualizar_resultados_directo.py",' not in text:
              text = text.replace(
                  '    "actualizar_resultados_directo.py",',
                  '    "buscar_resultados_google.py",\n    "actualizar_resultados_directo.py",',
                  2,
              )

          path.write_text(text, encoding='utf-8')
          PY
      - name: Eliminar temporal
        run: rm -f .github/workflows/apply-google-search-integration.yml
      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add actualizar_todo.py .github/workflows/apply-google-search-integration.yml
          git diff --staged --quiet || git commit -m "Integrar buscador Google en ciclo de actualizacion"
          git push
